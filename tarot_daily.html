<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Every Day</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --parchment: #f2ecda;
  --ink: #1c2e20;
  --ink-light: #3a5040;
  --gold: #b8943c;
  --cream: #faf6ec;
  --muted: #7a8a78;
}
html, body {
  background: var(--parchment);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
}
.page {
  max-width: 480px;
  margin: 0 auto;
  background: var(--parchment);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.top-bar {
  width: 100%;
  text-align: center;
  padding: 22px 24px 14px;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink);
  border-bottom: 1px solid rgba(28,46,32,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.top-bar .date { font-weight: 500; }
.top-bar .sep { opacity: 0.3; }
.header-section {
  width: 100%;
  text-align: center;
  padding: 28px 28px 0;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.spread-title {
  font-family: 'IM Fell English', Georgia, serif;
  font-size: 32px;
  font-weight: 400;
  color: #1a5c38;
  line-height: 1.15;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s;
}
.spread-title.visible { opacity: 1; transform: translateY(0); }
.spread {
  width: 100%;
  padding: 28px 16px 8px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
.card-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.card-position-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  min-height: 22px;
  line-height: 1.3;
}
.card-wrap {
  width: 100%;
  aspect-ratio: 3/5;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.card-scene {
  width: 100%;
  height: 100%;
  perspective: 900px;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
}
.card-inner.flipped {
  transform: rotateY(180deg);
}
.card-face {
  position: absolute;
  inset: 0;
  border-radius: 8px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.card-back {
  background: #1c2e20;
  border: 2px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  transform: rotateY(0deg);
}
.card-back-inner {
  width: calc(100% - 12px);
  height: calc(100% - 12px);
  border: 1px solid rgba(184,148,60,0.4);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-front {
  background: var(--cream);
  border: 2px solid var(--gold);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px;
  transform: rotateY(180deg);
}
.card-label {
  font-size: 7px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #8a7050;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  line-height: 1.3;
}
.card-art {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}
.card-art img {
  max-width: 100%;
  max-height: 100%;
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.card-numeral {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #8a7050;
  font-family: 'IM Fell English', serif;
}
.card-label,
.card-numeral {
  display: none;
}
.tap-hint {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  padding: 14px 24px 4px;
  font-style: italic;
  transition: opacity 0.4s;
}
.reading {
  width: 100%;
  padding: 24px 28px 36px;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.7s ease 0.3s, transform 0.7s ease 0.3s;
}
.reading.visible { opacity: 1; transform: translateY(0); }
.reading-rule {
  height: 1px;
  background: rgba(28,46,32,0.15);
  margin-bottom: 24px;
}
.reading-title {
  font-family: 'IM Fell English', Georgia, serif;
  font-size: 30px;
  line-height: 1.15;
  color: #1a5c38;
  text-align: center;
  margin-bottom: 14px;
}
.reading-text p {
  font-size: 17px;
  line-height: 1.78;
  color: var(--ink);
  text-align: center;
  font-weight: 300;
  margin-bottom: 1.2em;
}
.reading-text p:last-child { margin-bottom: 0; }
.footer {
  width: 100%;
  text-align: center;
  padding: 20px 24px 28px;
  border-top: 1px solid rgba(28,46,32,0.15);
  margin-top: auto;
}
.footer a {
  font-size: 14px;
  color: var(--ink-light);
  text-decoration: underline;
  text-underline-offset: 3px;
  letter-spacing: 0.02em;
}

/* Reversed card styling */
.card-inner.reversed .card-front {
  transform: rotateY(180deg) rotate(180deg);
}
</style>
</head>

function generateFallbackReading(cards) {
  var c0 = CARD_MEANINGS[cards[0].id] || { embrace: 'what this card asks you to embrace today', release: 'what this card asks you to release', message: 'the message this card carries' };
  var c1 = CARD_MEANINGS[cards[1].id] || { embrace: 'what this card asks you to embrace today', release: 'what this card asks you to release', message: 'the message this card carries' };
  var c2 = CARD_MEANINGS[cards[2].id] || { embrace: 'what this card asks you to embrace today', release: 'what this card asks you to release', message: 'the message this card carries' };

  return cards[0].name + ' in the Embrace position asks you to ' + c0.embrace + '. ' +
    cards[1].name + ', in Release, asks you to ' + c1.release + '. ' +
    cards[2].name + ' arrives as today\'s message: ' + c2.message + '.';
}

// ─── DAILY RANDOM DRAW ────────────────────────────────────────────────────────
// Draw 3 unique random cards for this user/session day.
// The result is persisted in localStorage and reused until the date changes.
function drawCards() {
  var deck = CARDS.slice();
  var drawn = [];

  for (var i = 0; i < 3; i++) {
    var idx = Math.floor(Math.random() * deck.length);
    drawn.push(deck[idx]);
    deck.splice(idx, 1);
  }
  return drawn;
}

// ─── LOCALSTORAGE PERSISTENCE ─────────────────────────────────────────────────
var STORAGE_KEY = 'tarot_daily_reading';

function getTodayKey() {
  var now = new Date();
  return now.getFullYear() + '-' + (now.getMonth() + 1) + '-' + now.getDate();
}

function loadTodaysReading() {
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (!stored) return null;
    var data = JSON.parse(stored);
    if (data.date !== getTodayKey()) return null; // stale — new day
    if (!data || !Array.isArray(data.cardIds) || data.cardIds.length !== 3 || typeof data.text !== 'string') {
      return null;
    }
    return data;
  } catch(e) {
    return null;
  }
}

function saveTodaysReading(data) {
  try {
    data.date = getTodayKey();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function splitCsvLine(line) {
  var out = [];
  var current = '';
  var inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line.charAt(i);
    if (ch === '"') {
      if (inQuotes && line.charAt(i + 1) === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      out.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  out.push(current);
  return out;
}

function normalizeCardId(raw) {
  return String(raw || '')
    .toLowerCase()
    .trim()
    .replace(/[\s_]+/g, '-')
    .replace(/[^a-z0-9-]/g, '');
}

function parseReadingsCsv(csvText) {
  var lines = String(csvText || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  var nonEmpty = lines.filter(function(line) { return line.trim() !== ''; });
  if (!nonEmpty.length) return { count: 0, readings: {} };

  var headerCols = splitCsvLine(nonEmpty[0]).map(function(col) { return col.trim().toLowerCase(); });
  var idxCombo = headerCols.indexOf('combo');
  var idxCard1 = headerCols.indexOf('card1');
  var idxCard2 = headerCols.indexOf('card2');
  var idxCard3 = headerCols.indexOf('card3');
  var idxTitle = headerCols.indexOf('title');
  var idxText = headerCols.indexOf('text');

  if (idxText === -1 || (idxCombo === -1 && (idxCard1 === -1 || idxCard2 === -1 || idxCard3 === -1))) {
    throw new Error('CSV needs columns: text + (combo OR card1,card2,card3). Optional: title');
  }

  var parsed = {};
  for (var i = 1; i < nonEmpty.length; i++) {
    var row = splitCsvLine(nonEmpty[i]);
    var combo = '';
    if (idxCombo !== -1) {
      combo = row[idxCombo] || '';
    } else {
      combo = [row[idxCard1], row[idxCard2], row[idxCard3]].map(normalizeCardId).join('|');
    }
    combo = combo.split('|').map(normalizeCardId).join('|');
    var text = (row[idxText] || '').trim();
    if (!combo || combo.split('|').length !== 3 || !text) continue;
    parsed[combo] = {
      title: idxTitle === -1 ? null : ((row[idxTitle] || '').trim() || null),
      text: text
    };
  }

  return { count: Object.keys(parsed).length, readings: parsed };
}

function applyReadingsFromCsvText(csvText) {
  var result = parseReadingsCsv(csvText);
  CSV_READINGS = result.readings;
  HAS_CSV_READINGS = Object.keys(CSV_READINGS).length > 0;
}

function getReadingForCombo(comboKey) {
  if (HAS_CSV_READINGS) {
    return CSV_READINGS[comboKey] || null;
  }
  return READINGS[comboKey] || null;
}

function drawCardsFromCsvCombos() {
  var combos = Object.keys(CSV_READINGS);
  if (!combos.length) return null;

  var chosenCombo = combos[Math.floor(Math.random() * combos.length)];
  var ids = chosenCombo.split('|');
  if (ids.length !== 3) return null;

  var cards = ids.map(function(id) {
    return getCardById(id);
  });

  if (!cards[0] || !cards[1] || !cards[2]) return null;
  return cards;
}

function loadReadingsFromRepoCsv(done) {
  fetch('./tarot_readings.csv', { cache: 'no-store' })
    .then(function(resp) {
      if (!resp.ok) throw new Error('Unable to load tarot_readings.csv');
      return resp.text();
    })
    .then(function(csvText) {
      applyReadingsFromCsvText(csvText);
    })
    .catch(function() {
      // If CSV isn't present or is invalid, we continue with built-in readings.
    })
    .finally(function() {
      if (typeof done === 'function') done();
    });
}

function renderCard(index, card) {
  var labelLines = card.label.split('\n');
  var labelHtml = labelLines.join('<br>');
  document.getElementById('card-label-' + index).innerHTML = labelHtml;
  var imagePath = CARD_IMAGE_MAP[card.id];
  if (imagePath) {
    document.getElementById('card-art-' + index).innerHTML =
      '<img src=\"' + imagePath + '\" alt=\"' + card.name + '\">';
  } else {
    // Fallback to vector art if an image isn't mapped.
    document.getElementById('card-art-' + index).innerHTML = card.art;
  }
  document.getElementById('card-numeral-' + index).textContent = card.numeral;
}

// ─── MAIN LOGIC ───────────────────────────────────────────────────────────────
var revealed = false;
var drawnCards = [];
var readingData = null;

function getCardById(cardId) {
  for (var i = 0; i < CARDS.length; i++) {
    if (CARDS[i].id === cardId) return CARDS[i];
  }
  return null;
}

function initDailyReading() {
  // Check localStorage first
  var stored = loadTodaysReading();

  if (stored) {
    // Re-hydrate the same reading
    drawnCards = stored.cardIds.map(function(id) {
      return getCardById(id);
    }).filter(Boolean);
    if (drawnCards.length === 3) {
      var storedComboKey = drawnCards.map(function(c) { return c.id; }).join('|');
      if (HAS_CSV_READINGS && !CSV_READINGS[storedComboKey]) {
        // Stored combo is outside CSV set; force redraw from CSV-only pool.
        readingData = null;
        drawnCards = [];
      } else {
        var latestReading = getReadingForCombo(storedComboKey);
        readingData = {
          cardIds: drawnCards.map(function(c) { return c.id; }),
          comboKey: storedComboKey,
          title: latestReading ? latestReading.title : (stored.title || null),
          text: latestReading ? latestReading.text : generateFallbackReading(drawnCards)
        };
        saveTodaysReading(readingData);
      }
    }
  }

  if (!readingData || drawnCards.length !== 3) {
    // If CSV is loaded, enforce CSV-only combos.
    var csvCards = HAS_CSV_READINGS ? drawCardsFromCsvCombos() : null;
    drawnCards = csvCards || drawCards();

    // Look up pre-written reading, or generate fallback
    var comboKey = drawnCards.map(function(c) { return c.id; }).join('|');
    var preWritten = getReadingForCombo(comboKey);

    readingData = {
      cardIds: drawnCards.map(function(c) { return c.id; }),
      comboKey: comboKey,
      title: preWritten ? preWritten.title : null,
      text: preWritten ? preWritten.text : generateFallbackReading(drawnCards)
    };

    saveTodaysReading(readingData);
  }

  // Render cards
  drawnCards.forEach(function(card, i) {
    renderCard(i, card);
  });

  // Populate reading text
  var readingTitleEl = document.getElementById('reading-title');
  if (readingData.title) {
    readingTitleEl.textContent = readingData.title;
    readingTitleEl.style.display = 'block';
  } else {
    readingTitleEl.textContent = '';
    readingTitleEl.style.display = 'none';
  }

  var readingTextEl = document.getElementById('reading-text');
  var p = document.createElement('p');
  p.textContent = readingData.text;
  readingTextEl.appendChild(p);
}

// ─── FLIP INTERACTION ─────────────────────────────────────────────────────────
function flipCard(id, delay) {
  setTimeout(function() {
    var el = document.getElementById(id);
    if (!el) return;
    el.style.transition = 'transform 0.65s cubic-bezier(0.4, 0, 0.2, 1)';
    el.style.transform = 'rotateY(180deg)';
  }, delay);
}

function revealAll() {
  if (revealed) return;
  revealed = true;
  document.getElementById('tap-hint').style.opacity = '0';
  flipCard('card-0', 0);
  flipCard('card-1', 180);
  flipCard('card-2', 360);
  setTimeout(function() {
    document.getElementById('reading').classList.add('visible');
  }, 700);
}

function wireRevealHandlers() {
  var ids = ['card-0', 'card-1', 'card-2'];
  for (var i = 0; i < ids.length; i++) {
    var inner = document.getElementById(ids[i]);
    if (!inner) continue;
    inner.addEventListener('click', revealAll);
    inner.addEventListener('touchstart', revealAll, false);
  }

  // Also bind the wrappers so tapping card margins still reveals.
  var wraps = document.querySelectorAll('.card-wrap');
  for (var j = 0; j < wraps.length; j++) {
    wraps[j].addEventListener('click', revealAll);
    wraps[j].addEventListener('touchstart', revealAll, false);
  }
}
loadReadingsFromRepoCsv(function() {
  initDailyReading();
  wireRevealHandlers();
});
